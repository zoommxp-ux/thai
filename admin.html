<!DOCTYPE html><html lang="ar" dir="rtl"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>لوحة الأسعار · BKK Shoppers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#f6f8fb;--card:#fff;--card2:#eef3f9;--mango:#e0a020;--mango-deep:#c4881a;
--leaf:#3d8fd6;--leaf-deep:#2d72b3;--ink:#1a2942;--mut:#5e7185;--line:#dde6f0;
--ok:#1ea672;--ok-bg:#e4f7ef;--warn:#d9822b;--warn-bg:#fcefdf;--hide:#9aa7b8;--danger:#d24a4a}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cairo',system-ui,sans-serif;background:radial-gradient(1200px 600px at 90% -10%,#e3edf8 0,transparent 55%),var(--bg);color:var(--ink);min-height:100vh}
button{font-family:inherit;cursor:pointer}
input{font-family:inherit}

/* ===== LOGIN ===== */
#login{position:fixed;inset:0;display:grid;place-items:center;padding:20px;z-index:60}
.login-card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:34px 28px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(26,41,66,.12);text-align:center}
.login-logo{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,var(--mango),var(--mango-deep));display:grid;place-items:center;margin:0 auto 14px;color:#fff;font-weight:900;font-size:30px}
.login-card h1{font-size:21px;font-weight:900}
.login-card .sub{color:var(--mut);font-size:13px;margin:4px 0 22px;font-weight:600}
.fld{text-align:right;margin-bottom:14px}
.fld label{display:block;font-size:13px;font-weight:700;margin-bottom:6px;color:var(--mut)}
.fld input{width:100%;border:2px solid var(--line);border-radius:13px;padding:12px 14px;font-size:15px;font-weight:600;outline:none;transition:.2s}
.fld input:focus{border-color:var(--mango);box-shadow:0 0 0 3px rgba(224,160,32,.15)}
.login-err{color:var(--danger);font-size:13px;font-weight:700;height:18px;margin-bottom:6px;display:none}
.login-err.show{display:block}
.btn-primary{width:100%;border:none;border-radius:13px;padding:13px;font-size:15px;font-weight:800;color:#fff;background:linear-gradient(135deg,var(--mango),var(--mango-deep))}
.login-foot{margin-top:16px;font-size:11px;color:var(--mut)}

/* ===== APP ===== */
#app{display:none}
#app.show{display:block}
header{position:sticky;top:0;z-index:40;background:rgba(255,255,255,.96);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.bar{display:flex;align-items:center;gap:12px;padding:12px 16px;max-width:1000px;margin:0 auto;flex-wrap:wrap}
.mark{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--mango),var(--mango-deep));display:grid;place-items:center;color:#fff;font-weight:900;font-size:18px;flex-shrink:0}
.htxt h1{font-size:16px;font-weight:900;line-height:1}
.htxt span{font-size:11px;color:var(--mut);font-weight:700}
.spacer{flex:1}
.dirty-badge{display:none;align-items:center;gap:5px;background:var(--warn-bg);color:var(--warn);font-size:12px;font-weight:800;padding:6px 11px;border-radius:20px}
.dirty-badge.show{display:inline-flex}
.user-chip{display:flex;align-items:center;gap:7px;background:var(--card2);padding:5px 10px 5px 5px;border-radius:20px;font-size:13px;font-weight:700}
.user-av{width:26px;height:26px;border-radius:50%;background:var(--leaf);color:#fff;display:grid;place-items:center;font-size:12px;font-weight:900}
.icon-btn{border:1px solid var(--line);background:var(--card);border-radius:11px;padding:8px 12px;font-size:13px;font-weight:800;color:var(--ink);display:inline-flex;align-items:center;gap:6px}
.icon-btn.export{background:linear-gradient(135deg,var(--ok),#159e6a);color:#fff;border:none}
.icon-btn.import{background:linear-gradient(135deg,var(--leaf),var(--leaf-deep));color:#fff;border:none}
.icon-btn.link{background:linear-gradient(135deg,#7a5cff,#5b3ee0);color:#fff;border:none}
.icon-btn.live{background:linear-gradient(135deg,#1ea672,#0f8f5e);color:#fff;border:none}
.icon-btn.live.linked{background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok)}
.icon-btn.link.linked{background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok)}
.save-status{font-size:12px;font-weight:800;color:var(--mut);white-space:nowrap}
.save-status.saving{color:var(--warn)} .save-status.saved{color:var(--ok)} .save-status.err{color:var(--danger)}
.icon-btn.ghost{color:var(--mut)}

.wrap{max-width:1000px;margin:0 auto;padding:16px}

/* stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px;text-align:center}
.stat .n{font-size:22px;font-weight:900;line-height:1}
.stat .l{font-size:11px;color:var(--mut);font-weight:700;margin-top:3px}
.stat.warn .n{color:var(--warn)} .stat.ok .n{color:var(--ok)} .stat.hide .n{color:var(--hide)}

/* controls */
.search-box{display:flex;align-items:center;gap:9px;background:var(--card);border:2px solid var(--line);border-radius:14px;padding:10px 15px;margin-bottom:10px}
.search-box:focus-within{border-color:var(--mango);box-shadow:0 0 0 3px rgba(224,160,32,.15)}
.search-box input{flex:1;border:none;outline:none;background:none;font-size:15px;font-weight:600}
.search-box span{color:var(--mut);font-size:18px}
.search-box .clr{cursor:pointer;color:var(--mut);font-weight:900;font-size:18px;display:none}
.search-box .clr.show{display:block}

.tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:8px}
.tab{flex-shrink:0;border:1px solid var(--line);background:var(--card);border-radius:20px;padding:8px 14px;font-size:13px;font-weight:800;color:var(--mut);display:inline-flex;align-items:center;gap:6px}
.tab.active{background:var(--ink);color:#fff;border-color:var(--ink)}
.tab .cnt{background:rgba(0,0,0,.08);border-radius:12px;padding:1px 7px;font-size:11px;font-weight:900}
.tab.active .cnt{background:rgba(255,255,255,.2)}

.qfilter{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.chk{display:inline-flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--line);border-radius:20px;padding:7px 13px;font-size:13px;font-weight:700;color:var(--ink);user-select:none}
.chk input{width:16px;height:16px;accent-color:var(--mango)}
.count-info{font-size:12px;color:var(--mut);font-weight:700}

/* product rows */
.list{display:flex;flex-direction:column;gap:9px}
.row{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:11px;display:flex;align-items:center;gap:12px;transition:.15s}
.row.hidden-row{opacity:.55;background:var(--card2)}
.thumb{width:58px;height:58px;border-radius:11px;object-fit:cover;background:var(--card2);flex-shrink:0;border:1px solid var(--line)}
.info{flex:1;min-width:0}
.info .nm{font-size:14px;font-weight:800;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.info .vr{font-size:12px;color:var(--mut);font-weight:600;margin-top:2px;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.sec-badge{display:inline-block;font-size:10px;font-weight:800;color:var(--leaf-deep);background:#e8f1fb;border-radius:8px;padding:1px 7px;margin-top:4px}
.price-wrap{display:flex;align-items:center;gap:4px;background:var(--card2);border:2px solid var(--line);border-radius:12px;padding:5px 10px;flex-shrink:0;transition:.15s}
.price-wrap:focus-within{border-color:var(--mango);background:#fff}
.price-wrap.unpriced{border-color:var(--warn);background:var(--warn-bg)}
.price-wrap .cur{font-size:15px;font-weight:800;color:var(--mut)}
.price-wrap input{width:62px;border:none;outline:none;background:none;font-size:16px;font-weight:900;text-align:center;color:var(--ink)}
.price-wrap input::-webkit-outer-spin-button,.price-wrap input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.price-wrap input[type=number]{-moz-appearance:textfield}
.hide-btn{flex-shrink:0;border:1px solid var(--line);background:var(--card);border-radius:11px;width:42px;height:42px;font-size:18px;display:grid;place-items:center;color:var(--mut)}
.hide-btn.is-hidden{background:var(--hide);color:#fff;border-color:var(--hide)}
.empty{text-align:center;padding:50px 20px;color:var(--mut);font-weight:700}

/* toast */
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(120px);background:var(--ink);color:#fff;padding:12px 22px;border-radius:30px;font-size:14px;font-weight:800;z-index:80;transition:.3s;box-shadow:0 10px 30px rgba(0,0,0,.25);max-width:90vw;text-align:center}
#toast.show{transform:translateX(-50%) translateY(0)}
#toast.ok{background:var(--ok)} #toast.warn{background:var(--warn)}

@media(max-width:560px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .thumb{width:50px;height:50px}
  .price-wrap input{width:54px}
  .info .nm{font-size:13px}
}
</style></head><body>

<!-- ===== LOGIN ===== -->
<div id="login">
  <div class="login-card">
    <div class="login-logo">B</div>
    <h1>لوحة الأسعار</h1>
    <div class="sub">BKK Shoppers · إدارة الأسعار والإظهار</div>
    <div class="fld"><label>اسم المستخدم</label><input id="lu" autocomplete="username" placeholder="admin-XX-xp1"></div>
    <div class="fld"><label>كلمة المرور</label><input id="lp" type="password" autocomplete="current-password" placeholder="••••••••"></div>
    <div class="login-err" id="loginErr">بيانات الدخول غير صحيحة</div>
    <button class="btn-primary" id="loginBt">دخول</button>
    <div class="login-foot">الوصول للمصرّح لهم فقط</div>
  </div>
</div>

<!-- ===== APP ===== -->
<div id="app">
  <header><div class="bar">
    <div class="mark">B</div>
    <div class="htxt"><h1>لوحة الأسعار</h1><span>BKK Shoppers</span></div>
    <div class="spacer"></div>
    <span class="save-status" id="saveStatus"></span>
    <div class="dirty-badge" id="dirtyBadge">● تغييرات غير محفوظة</div>
    <button class="icon-btn live" id="liveBt">🌐 ربط بالمتجر الحي</button>
    <button class="icon-btn link" id="linkBt">🔗 ربط الملف (حفظ تلقائي)</button>
    <button class="icon-btn import" id="importBt">⬆ استيراد</button>
    <button class="icon-btn export" id="exportBt">⬇ تصدير</button>
    <div class="user-chip"><span id="userName">—</span><span class="user-av" id="userAv">?</span></div>
    <button class="icon-btn ghost" id="logoutBt">خروج</button>
  </div></header>

  <div class="wrap">
    <div class="stats">
      <div class="stat"><div class="n" id="stTotal">0</div><div class="l">إجمالي المنتجات</div></div>
      <div class="stat ok"><div class="n" id="stPriced">0</div><div class="l">مُسعّرة</div></div>
      <div class="stat warn"><div class="n" id="stUnpriced">0</div><div class="l">بلا سعر</div></div>
      <div class="stat hide"><div class="n" id="stHidden">0</div><div class="l">مخفية</div></div>
    </div>

    <div class="search-box">
      <span>🔍</span>
      <input id="search" placeholder="ابحث بالاسم أو اللون/الموديل…">
      <span class="clr" id="searchClr">✕</span>
    </div>

    <div class="tabs" id="tabs"></div>

    <div class="qfilter">
      <label class="chk"><input type="checkbox" id="onlyUnpriced"><span>بلا سعر فقط</span></label>
      <label class="chk"><input type="checkbox" id="showHidden" checked><span>إظهار المخفية في القائمة</span></label>
      <span class="count-info" id="countInfo"></span>
    </div>

    <div class="list" id="list"></div>
  </div>
</div>

<input type="file" id="importFile" accept="application/json" style="display:none">
<div id="toast"></div>

const LS_DATA   = "bkk_admin_products_v1";
const LS_SESSION= "bkk_admin_session_v1";
const LS_DIRTY  = "bkk_admin_dirty_v1";

/* ===== state ===== */
let products=[], session=null, dirty=false;
let filterSection="all", q="", onlyUnpriced=false, showHidden=true;
const $=s=>document.querySelector(s);

function uid(){return "p"+Math.random().toString(36).slice(2,9);}
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

/* ===== data ===== */
function loadData(){
  let saved=null;
  try{ saved=JSON.parse(localStorage.getItem(LS_DATA)); }catch(e){}
  const base=(Array.isArray(saved)&&saved.length)?saved:SEED;
  products=base.map(p=>({
    id:p.id||uid(),
    name:p.name||"", variant:p.variant||"",
    price:Number(p.price)||0,
    img:p.img||"", spec:p.spec||"",
    section:p.section||"makeup",
    page:p.page||SECTION_PAGE[p.section]||"",
    hidden:!!p.hidden,
  }));
  dirty=localStorage.getItem(LS_DIRTY)==="1";
}
function persist(){
  try{ localStorage.setItem(LS_DATA,JSON.stringify(products)); }catch(e){}
  dirty=true; localStorage.setItem(LS_DIRTY,"1"); updateDirty();
}
function updateDirty(){ $("#dirtyBadge").classList.toggle("show",dirty); }

/* ===== auth ===== */
function login(){
  const u=$("#lu").value.trim(), p=$("#lp").value;
  const acc=ACCOUNTS.find(a=>a.user===u&&a.pass===p);
  if(!acc){ $("#loginErr").classList.add("show"); return; }
  session={user:acc.user,name:acc.name};
  localStorage.setItem(LS_SESSION,JSON.stringify(session));
  $("#loginErr").classList.remove("show"); enterApp();
}
function logout(){
  localStorage.removeItem(LS_SESSION); session=null;
  $("#app").classList.remove("show"); $("#login").style.display="grid";
  $("#lu").value=""; $("#lp").value="";
}
function tryRestore(){
  try{ session=JSON.parse(localStorage.getItem(LS_SESSION)); }catch(e){}
  if(session&&session.user) enterApp();
}
function enterApp(){
  $("#login").style.display="none"; $("#app").classList.add("show");
  $("#userName").textContent=session.name;
  $("#userAv").textContent=(session.name||"?").trim().slice(0,1);
  loadData(); buildTabs(); render(); updateDirty(); restoreConnections();
}

/* ===== counts / stats ===== */
function counts(){
  const c={all:products.length};
  for(const k in SECTION_LABELS) c[k]=products.filter(p=>p.section===k).length;
  return c;
}
function updateStats(){
  $("#stTotal").textContent=products.length;
  $("#stPriced").textContent=products.filter(p=>p.price>0).length;
  $("#stUnpriced").textContent=products.filter(p=>!p.price).length;
  $("#stHidden").textContent=products.filter(p=>p.hidden).length;
}

/* ===== tabs ===== */
function buildTabs(){
  const c=counts(); const box=$("#tabs"); box.innerHTML="";
  const items=[["all","📦 الكل"],...Object.entries(SECTION_LABELS)];
  items.forEach(([k,lbl])=>{
    const b=document.createElement("button");
    b.className="tab"+(filterSection===k?" active":"");
    b.innerHTML=`<span>${lbl}</span><span class="cnt">${c[k]||0}</span>`;
    b.onclick=()=>{ filterSection=k; buildTabs(); render(); };
    box.appendChild(b);
  });
}

/* ===== visible list ===== */
function visible(){
  return products.filter(p=>{
    if(filterSection!=="all"&&p.section!==filterSection) return false;
    if(onlyUnpriced&&p.price>0) return false;
    if(!showHidden&&p.hidden) return false;
    if(q){
      const t=(p.name+" "+p.variant).toLowerCase();
      if(!t.includes(q)) return false;
    }
    return true;
  });
}

/* ===== render ===== */
function render(){
  updateStats();
  const list=$("#list"); const vis=visible();
  $("#countInfo").textContent=`عرض ${vis.length} منتج`;
  if(!vis.length){ list.innerHTML='<div class="empty">لا توجد منتجات مطابقة</div>'; return; }
  list.innerHTML="";
  vis.forEach(p=>{
    const row=document.createElement("div");
    row.className="row"+(p.hidden?" hidden-row":"");
    row.innerHTML=`
      <img class="thumb" src="${esc(p.img)}" alt="" loading="lazy"
           onerror="this.style.visibility='hidden'">
      <div class="info">
        <div class="nm">${esc(p.name)}</div>
        <div class="vr">${esc(p.variant)}</div>
        <span class="sec-badge">${esc((SECTION_LABELS[p.section]||p.section))}</span>
      </div>
      <div class="price-wrap${p.price>0?'':' unpriced'}">
        <span class="cur">฿</span>
        <input type="number" min="0" step="1" inputmode="numeric"
               value="${p.price>0?p.price:''}" placeholder="0">
      </div>
      <button class="hide-btn${p.hidden?' is-hidden':''}" title="${p.hidden?'مخفي — اضغط للإظهار':'ظاهر — اضغط للإخفاء'}">
        ${p.hidden?'🚫':'👁'}
      </button>`;

    const inp=row.querySelector("input");
    const pw=row.querySelector(".price-wrap");
    inp.addEventListener("input",()=>{
      const v=Math.max(0,Math.floor(Number(inp.value)||0));
      p.price=v;
      pw.classList.toggle("unpriced",v<=0);
      persist(); updateStats(); scheduleAutoSave();
    });

    row.querySelector(".hide-btn").addEventListener("click",()=>{
      p.hidden=!p.hidden;
      persist(); scheduleAutoSave(); render();
      toast(p.hidden?"تم إخفاء المنتج":"تم إظهار المنتج", p.hidden?"warn":"ok");
    });

    list.appendChild(row);
  });
}

/* ===== export / import ===== */
function exportData(){
  const clean=products.map(({name,variant,price,img,spec,section,page,hidden})=>{
    const o={img,name,variant,price:Number(price)||0,spec,section,page};
    if(hidden) o.hidden=true;
    return o;
  });
  const blob=new Blob([JSON.stringify(clean,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob); a.download="products.json"; a.click();
  URL.revokeObjectURL(a.href);
  dirty=false; localStorage.setItem(LS_DIRTY,"0"); updateDirty();
  toast("تم تنزيل products.json — ارفعه إلى الموقع","ok");
}
function importData(file){
  const r=new FileReader();
  r.onload=()=>{
    try{
      const arr=JSON.parse(r.result);
      if(!Array.isArray(arr)) throw 0;
      localStorage.setItem(LS_DATA,JSON.stringify(arr));
      localStorage.setItem(LS_DIRTY,"0"); dirty=false;
      loadData(); buildTabs(); render(); updateDirty();
      toast("تم استيراد الملف بنجاح","ok");
    }catch(e){ toast("ملف غير صالح","warn"); }
  };
  r.readAsText(file);
}

/* ===== toast ===== */
let toastT;
function toast(msg,kind){
  const t=$("#toast"); t.textContent=msg; t.className="show "+(kind||"");
  clearTimeout(toastT); toastT=setTimeout(()=>t.className=t.className.replace("show","").trim(),2200);
}

/* ===== events ===== */
$("#loginBt").addEventListener("click",login);
$("#lp").addEventListener("keydown",e=>{ if(e.key==="Enter") login(); });
$("#logoutBt").addEventListener("click",logout);
$("#exportBt").addEventListener("click",exportData);
$("#importBt").addEventListener("click",()=>{
  if(dirty && !confirm("لديك تغييرات غير محفوظة سيتم استبدالها بالملف المستورد. متابعة؟")) return;
  $("#importFile").click();
});
$("#search").addEventListener("input",e=>{
  q=e.target.value.trim().toLowerCase();
  $("#searchClr").classList.toggle("show",!!q); render();
});
$("#searchClr").addEventListener("click",()=>{ $("#search").value=""; q=""; $("#searchClr").classList.remove("show"); render(); });
$("#onlyUnpriced").addEventListener("change",e=>{ onlyUnpriced=e.target.checked; render(); });
$("#showHidden").addEventListener("change",e=>{ showHidden=e.target.checked; render(); });
$("#importFile").addEventListener("change",e=>{ if(e.target.files[0]) importData(e.target.files[0]); e.target.value=""; });

/* allow re-import via keyboard shortcut-free hidden control: long-press logo not needed */
/* ===== auto-save to products.json (File System Access API) ===== */
const FSA_OK = ('showOpenFilePicker' in window);
let fileHandle=null, autoSaveT=null;

function idb(){return new Promise((res,rej)=>{const r=indexedDB.open('bkk_admin',1);
  r.onupgradeneeded=()=>r.result.createObjectStore('h');r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
async function idbSet(k,v){const db=await idb();return new Promise((res,rej)=>{const t=db.transaction('h','readwrite');t.objectStore('h').put(v,k);t.oncomplete=()=>res();t.onerror=()=>rej(t.error);});}
async function idbGet(k){const db=await idb();return new Promise((res,rej)=>{const t=db.transaction('h','readonly');const q=t.objectStore('h').get(k);q.onsuccess=()=>res(q.result);q.onerror=()=>rej(q.error);});}

function setSaveStatus(state,msg){const el=$("#saveStatus");el.className="save-status "+(state||"");el.textContent=msg||"";}
function buildClean(){
  return products.map(({name,variant,price,img,spec,section,page,hidden})=>{
    const o={img,name,variant,price:Number(price)||0,spec,section,page};
    if(hidden) o.hidden=true; return o; });
}
function markLinked(){
  $("#linkBt").classList.add("linked");
  $("#linkBt").textContent="🔗 مرتبط — حفظ تلقائي";
  setSaveStatus("saved","تم الحفظ ✓");
}
async function linkFile(){
  if(!FSA_OK){ toast("متصفحك لا يدعم الحفظ التلقائي — استخدم تصدير","warn"); return; }
  try{
    const [h]=await window.showOpenFilePicker({types:[{description:"JSON",accept:{"application/json":[".json"]}}]});
    const perm=await h.requestPermission({mode:"readwrite"});
    if(perm!=="granted"){ toast("لم يُسمح بالكتابة على الملف","warn"); return; }
    fileHandle=h; try{ await idbSet("products",h); }catch(e){}
    const file=await h.getFile(); const arr=JSON.parse(await file.text());
    if(Array.isArray(arr)&&arr.length){
      localStorage.setItem(LS_DATA,JSON.stringify(arr));
      loadData(); buildTabs(); render();
    }
    markLinked();
    toast("تم ربط الملف — الحفظ تلقائي الآن","ok");
  }catch(e){ if(e&&e.name!=="AbortError") toast("تعذّر ربط الملف","warn"); }
}
async function writeFile(){
  if(!fileHandle) return;
  try{
    setSaveStatus("saving","جارٍ الحفظ…");
    const w=await fileHandle.createWritable();
    await w.write(new Blob([JSON.stringify(buildClean(),null,2)],{type:"application/json"}));
    await w.close();
    dirty=false; localStorage.setItem(LS_DIRTY,"0"); updateDirty();
    setSaveStatus("saved","تم الحفظ ✓");
  }catch(e){ setSaveStatus("err","لم يُحفظ — أعد الربط"); }
}
function scheduleAutoSave(){
  if(!fileHandle && !liveMode) return;
  setSaveStatus("saving","جارٍ الحفظ…");
  clearTimeout(autoSaveT); autoSaveT=setTimeout(doAutoSave,600);
}
async function doAutoSave(){
  if(liveMode){ await saveLive(); }
  else if(fileHandle){ await writeFile(); }
}

/* ===== live store (Netlify Function + Blobs) ===== */
let liveMode=false, adminToken=null;
const LS_TOKEN="bkk_admin_token_v1";

function markLive(){
  const b=$("#liveBt"); b.classList.add("linked"); b.textContent="🌐 مرتبط بالمتجر";
  $("#linkBt").style.display="none";
  setSaveStatus("saved","محفوظ على المتجر ✓");
}
async function loadFromLive(){
  const r=await fetch('/api/products',{cache:'no-store'});
  if(!r.ok) throw new Error('read');
  const arr=await r.json();
  if(Array.isArray(arr)&&arr.length){
    localStorage.setItem(LS_DATA,JSON.stringify(arr));
    loadData(); buildTabs(); render();
  }
}
async function saveLive(){
  try{
    setSaveStatus("saving","جارٍ الحفظ…");
    const r=await fetch('/api/products',{method:'POST',
      headers:{'content-type':'application/json','x-admin-token':adminToken},
      body:JSON.stringify(buildClean())});
    if(r.status===401){ setSaveStatus("err","التوكن غير صحيح"); return false; }
    if(!r.ok){ setSaveStatus("err","فشل الحفظ"); return false; }
    dirty=false; localStorage.setItem(LS_DIRTY,"0"); updateDirty();
    setSaveStatus("saved","محفوظ على المتجر ✓");
    return true;
  }catch(e){ setSaveStatus("err","لا يوجد اتصال"); return false; }
}
async function connectLive(){
  if(liveMode){
    if(confirm("فصل الربط بالمتجر الحيّ؟")){
      liveMode=false; adminToken=null; localStorage.removeItem(LS_TOKEN);
      $("#liveBt").classList.remove("linked"); $("#liveBt").textContent="🌐 ربط بالمتجر الحي";
      $("#linkBt").style.display=""; setSaveStatus("","");
    }
    return;
  }
  const t=prompt("أدخل ADMIN_TOKEN (كلمة سر الكتابة من Netlify):", "");
  if(t===null) return;
  adminToken=t.trim();
  try{
    await loadFromLive();
    const ok=await saveLive();           // verify write permission
    if(!ok){ adminToken=null; toast("تعذّر الحفظ — تحقّق من التوكن","warn"); return; }
    liveMode=true; localStorage.setItem(LS_TOKEN,adminToken); markLive();
    toast("تم الربط بالمتجر الحيّ — الحفظ مباشر الآن","ok");
  }catch(e){ adminToken=null; toast("تعذّر الاتصال بـ /api/products — هل نُشرت الدالة؟","warn"); }
}
async function restoreLive(){
  const t=localStorage.getItem(LS_TOKEN); if(!t) return false;
  adminToken=t;
  try{ await loadFromLive(); liveMode=true; markLive(); return true; }
  catch(e){ return false; }
}
async function restoreConnections(){
  const live=await restoreLive();
  if(!live) restoreLink();
}
async function restoreLink(){
  if(!FSA_OK){ $("#linkBt").style.display="none"; setSaveStatus("","الحفظ التلقائي غير مدعوم بهذا المتصفح"); return; }
  try{
    const h=await idbGet("products"); if(!h) return;
    const perm=await h.queryPermission({mode:"readwrite"});
    if(perm==="granted"){
      fileHandle=h;
      const file=await h.getFile(); const arr=JSON.parse(await file.text());
      if(Array.isArray(arr)&&arr.length){ localStorage.setItem(LS_DATA,JSON.stringify(arr)); loadData(); buildTabs(); render(); }
      markLinked();
    }else{
      $("#linkBt").textContent="🔗 إعادة ربط الملف";
      setSaveStatus("","اضغط «إعادة ربط الملف» لتفعيل الحفظ التلقائي");
    }
  }catch(e){}
}
$("#linkBt").addEventListener("click",linkFile);
$("#liveBt").addEventListener("click",connectLive);

window.addEventListener("beforeunload",e=>{ if(dirty){ e.preventDefault(); e.returnValue=""; } });

tryRestore();
</script>
